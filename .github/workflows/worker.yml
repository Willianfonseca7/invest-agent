name: Worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    name: Run cycle
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --include=dev

      - run: npm --workspace apps/worker run build

      - run: node apps/worker/dist/index.js
        env:
          EXECUTION_MODE: ${{ secrets.EXECUTION_MODE }}
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          BINANCE_TESTNET: ${{ secrets.BINANCE_TESTNET }}
          TRADE_AMOUNT_USDT: ${{ secrets.TRADE_AMOUNT_USDT }}
          MAX_OPEN_TRADES: ${{ secrets.MAX_OPEN_TRADES }}
          STOP_LOSS_PCT: ${{ secrets.STOP_LOSS_PCT }}
          TAKE_PROFIT_PCT: ${{ secrets.TAKE_PROFIT_PCT }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          WORKER_INTERVAL_MS: "0"
