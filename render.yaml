services:
  - type: web
    name: invest-agent-api
    runtime: node
    buildCommand: npm ci && npm --workspace apps/api run build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

  - type: web
    name: invest-agent-web
    env: static
    buildCommand: npm ci && npm --workspace apps/web run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://invest-agent-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
